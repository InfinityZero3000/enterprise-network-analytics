services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ena-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "2181:2181"
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 384M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ena-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 768M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ena-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  neo4j:
    image: neo4j:5.18-community
    container_name: ena-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ena_password}
      NEO4J_PLUGINS: '["graph-data-science","apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 3.5G

  spark-master:
    image: apache/spark:3.5.1
    container_name: ena-spark-master
    user: root
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_HOST=spark-master
      - SPARK_DAEMON_MEMORY=256m
    ports:
      - "8082:8080"
      - "7077:7077"
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 512M

  spark-worker:
    image: apache/spark:3.5.1
    container_name: ena-spark-worker
    user: root
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
      - SPARK_DAEMON_MEMORY=256m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 2.5G

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: ena-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: ena-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ena-api
    depends_on:
      - neo4j
      - kafka
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ena_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 512M


  postgres-airflow:
    image: postgres:15
    container_name: ena-postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  airflow-init:
    image: apache/airflow:2.8.2
    container_name: ena-airflow-init
    depends_on:
      - postgres-airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin_password
    command: version
    networks:
      - ena-net

  airflow-webserver:
    image: apache/airflow:2.8.2
    container_name: ena-airflow-webserver
    depends_on:
      - postgres-airflow
      - airflow-init
    ports:
      - "8086:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      # Volumes mapping
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
    volumes:
      - ./pipeline/orchestration/airflow_dags:/opt/airflow/dags
      - ./.venv/lib/python3.12/site-packages:/home/airflow/.local/lib/python3.12/site-packages:ro # Share python packages if possible, but actually we should just map codebase
      - .:/opt/airflow/plugins
      - ./.env:/opt/airflow/.env
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 512M

  airflow-scheduler:
    image: apache/airflow:2.8.2
    container_name: ena-airflow-scheduler
    depends_on:
      - postgres-airflow
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres-airflow/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
    volumes:
      - ./pipeline/orchestration/airflow_dags:/opt/airflow/dags
      - .:/opt/airflow/plugins
      - ./.env:/opt/airflow/.env
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_airflow_data:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  minio_data:

networks:
  ena-net:
    driver: bridge
