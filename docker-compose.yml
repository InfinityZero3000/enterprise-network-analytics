services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ena-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms96m -Xmx192m"
    ports:
      - "2181:2181"
    mem_limit: 256m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ena-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms192m -Xmx384m"
    mem_limit: 512m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 512M

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ena-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    mem_limit: 192m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 192M

  neo4j:
    image: neo4j:5.18-community
    container_name: ena-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ena_password}
      NEO4J_PLUGINS: '["graph-data-science","apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 384m
      NEO4J_dbms_memory_heap_max__size: 768m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    mem_limit: 1536m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 1536M

  spark-master:
    image: apache/spark:3.5.3
    container_name: ena-spark-master
    restart: unless-stopped
    user: root
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_HOST=spark-master
      - SPARK_DAEMON_MEMORY=192m
    ports:
      - "8082:8080"
      - "7077:7077"
    mem_limit: 256m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  spark-worker:
    image: apache/spark:3.5.3
    container_name: ena-spark-worker
    restart: unless-stopped
    user: root
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=768m
      - SPARK_WORKER_CORES=1
      - SPARK_DAEMON_MEMORY=192m
    mem_limit: 1024m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 1024M

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: ena-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow
    mem_limit: 192m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 192M

  minio:
    image: minio/minio:latest
    container_name: ena-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    mem_limit: 256m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ena-api
    restart: unless-stopped
    depends_on:
      - neo4j
      - kafka
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ena_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    mem_limit: 512m
    networks:
      - ena-net
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  minio_data:

networks:
  ena-net:
    driver: bridge
