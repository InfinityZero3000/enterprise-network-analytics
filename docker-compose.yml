version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ena-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ena-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ena-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ena-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ena-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ena-net

  neo4j:
    image: neo4j:5.18-community
    container_name: ena-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ena_password}
      NEO4J_PLUGINS: '["graph-data-science","apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_memory_heap_max__size: 4G
      NEO4J_dbms_memory_pagecache_size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ena-net

  spark-master:
    image: bitnami/spark:3.5
    container_name: ena-spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "8082:8080"
      - "7077:7077"
    networks:
      - ena-net

  spark-worker:
    image: bitnami/spark:3.5
    container_name: ena-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    networks:
      - ena-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: ena-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    volumes:
      - mlflow_data:/mlflow
    networks:
      - ena-net

  minio:
    image: minio/minio:latest
    container_name: ena-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ena-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ena-api
    depends_on:
      - neo4j
      - kafka
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ena_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ena-net

volumes:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  minio_data:

networks:
  ena-net:
    driver: bridge
