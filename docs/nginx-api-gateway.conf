# Nginx gateway for Enterprise Network Analytics API
# Replace server_name and SSL certificate paths before production use.

server {
    listen 80;
    server_name api.example.com;

    # Redirect HTTP to HTTPS in production.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    # Configure your certificate files (Let's Encrypt recommended).
    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # Basic hardening
    client_max_body_size 20m;
    keepalive_timeout 65;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Optional: if you expose API under /api on gateway,
        # update API_ROOT_PATH=/api and use location /api/ { ... }
        # with matching rewrite/proxy_pass behavior.
    }
}
